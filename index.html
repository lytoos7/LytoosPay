<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LytoosPay</title>
    <style>
        /* TAMPILAN GAYA MINIMALIS MODERN STYLE */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        .app-container { max-width: 450px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        .header { background: #6f42c1; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .menu-item { text-align: center; cursor: pointer; background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-item img { width: 40px; height: 40px; margin-bottom: 5px; }
        .menu-item span { display: block; font-size: 12px; font-weight: 500; }
        
        /* HALAMAN TRANSAKSI (TERSEMBUNYI DI AWAL) */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn-back { background: #e2e6ea; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .provider-badge { display: inline-block; background: #e2d9f3; color: #6f42c1; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-top: 5px; font-weight: bold; }
        
        /* DAFTAR PRODUK NOMINAL */
        .product-list { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .product-card { border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; }
        .product-card:hover { border-color: #6f42c1; background: #f8f9fa; }
        .product-name { font-weight: bold; color: #333; margin-bottom: 5px; }
        .product-price { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER UTAMA -->
    <div class="header" id="app-title">LytoosPay</div>

    <!-- 1. HALAMAN UTAMA (MENU DASHBOARD) -->
    <div id="page-home" class="page active">
        <div class="menu-grid">
            <div class="menu-item" onclick="bukaHalaman('pulsa', 'Beli Pulsa Prabayar')">
                <img src="https://cdn-icons-png.flaticon.com/512/3616/3616230.png" alt="Pulsa">
                <span>Pulsa</span>
            </div>
            <div class="menu-item" onclick="bukaHalaman('data', 'Paket Data Internet')">
                <img src="https://cdn-icons-png.flaticon.com/512/2885/2885422.png" alt="Data">
                <span>Data</span>
            </div>
            <div class="menu-item" onclick="bukaHalaman('ewallet', 'Top Up E-Wallet')">
                <img src="https://cdn-icons-png.flaticon.com/512/4731/4731110.png" alt="E-Wallet">
                <span>E-Wallet</span>
            </div>
            <div class="menu-item" onclick="bukaHalaman('pln', 'Token Listrik PLN')">
                <img src="https://cdn-icons-png.flaticon.com/512/3104/3104844.png" alt="PLN">
                <span>PLN</span>
            </div>
        </div>
        
        <!-- TOMBOL ISI SALDO -->
        <div style="padding: 0 20px; margin-top: 20px;">
            <button onclick="bukaHalaman('saldo', 'Isi Saldo Akun')" style="width:100%; padding: 15px; background: #28a745; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
                ➕ Isi Saldo / Top Up Akun
            </button>
        </div>
    </div>

    <!-- 2. HALAMAN TRANSAKSI DINAMIS -->
    <div id="page-transaksi" class="page">
        <button class="btn-back" onclick="kembaliKeHome()">⬅️ Kembali</button>
        <h3 id="transaksi-title">Menu Transaksi</h3>
        
        <div class="input-group">
            <label id="label-tujuan" style="display:block; margin-bottom:5px; font-weight:500;">Masukkan Nomor Tujuan:</label>
            <input type="text" id="input-tujuan" placeholder="Contoh: 0821xxxx" oninput="prosesInputTujuan()">
            <div id="provider-info" class="provider-badge" style="display:none;">Provider: Mendeteksi...</div>
        </div>

        <div id="loading-produk" style="display:none; text-align:center; padding: 20px; font-weight: bold; color: #6f42c1;">Mencari produk...</div>
        <div class="product-list" id="daftar-produk">
            <!-- Daftar produk otomatis muncul di sini dari Firestore -->
        </div>
    </div>
</div>

<!-- ========================================================== -->
<!-- BAGIAN 1: PENGATURAN FIREBASE (WAJIB ANDA ISI!) -->
<!-- ========================================================== -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
  // SILAKAN ISI DENGAN KUNCI DARI FIREBASE CONSOLE ANDA:
  var firebaseConfig = {
    apiKey: "AIzaSyD5OAu-ytGL26g1iHrBfNqY8mm2zB2Sphg",
    authDomain: "lytoospay-66a22.firebaseapp.com",
    projectId: "lytoospay-66a22",
    storageBucket: "lytoospay-66a22.firebasestorage.app",
    messagingSenderId: "143149599518",
    appId: "1:143149599518:web:828b8dcf8a1a77cd75970f"
  };
  
  // Menyalakan Firebase
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
</script>

<!-- ========================================================== -->
<!-- BAGIAN 2: LOGIKA TAMPILAN & JEMBATAN TRANSAKSI -->
<!-- ========================================================== -->
<script>
    let kategoriAktif = "";

    // FUNGSI 1: PINDAH HALAMAN
    function bukaHalaman(kategori, judul) {
        kategoriAktif = kategori;
        document.getElementById("page-home").classList.remove("active");
        document.getElementById("page-transaksi").classList.add("active");
        document.getElementById("transaksi-title").innerText = judul;
        
        // Reset form
        document.getElementById("input-tujuan").value = "";
        document.getElementById("provider-info").style.display = "none";
        document.getElementById("daftar-produk").innerHTML = "";

        if(kategori === 'pln') {
            document.getElementById("label-tujuan").innerText = "Masukkan Nomor Meteran / ID Pelanggan:";
            document.getElementById("input-tujuan").placeholder = "Contoh: 140xxxxxx";
            ambilProdukDariFirestore('pln', 'pln'); // Langsung sedot data PLN
        } else if(kategori === 'ewallet') {
            document.getElementById("label-tujuan").innerText = "Masukkan Nomor E-Wallet / HP Tujuan:";
            document.getElementById("input-tujuan").placeholder = "Contoh: 08xxxxxx";
            // Catatan: Jika E-Wallet butuh deteksi provider (misal DANA, OVO), Anda bisa sesuaikan nanti.
            // Sementara kita tampilkan semua e-wallet
            ambilProdukDariFirestore('ewallet', 'ewallet'); 
        } else if(kategori === 'saldo') {
            document.getElementById("label-tujuan").innerText = "Masukkan Jumlah Isi Saldo (Rp):";
            document.getElementById("input-tujuan").placeholder = "Contoh: 50000";
            document.getElementById("daftar-produk").innerHTML = "<div class='product-card' onclick='alert(\"Silakan transfer ke rekening admin untuk isi saldo.\")'><div class='product-name'>Klik untuk Konfirmasi</div></div>";
        } else {
            document.getElementById("label-tujuan").innerText = "Masukkan Nomor HP Tujuan:";
            document.getElementById("input-tujuan").placeholder = "Contoh: 0821xxxxxxx";
        }
    }

    function kembaliKeHome() {
        document.getElementById("page-transaksi").classList.remove("active");
        document.getElementById("page-home").classList.add("active");
    }

    // FUNGSI 2: DETEKSI PROVIDER OTOMATIS (KHUSUS PULSA & DATA)
    function prosesInputTujuan() {
        if (kategoriAktif !== 'pulsa' && kategoriAktif !== 'data') return;

        let noHP = document.getElementById("input-tujuan").value;
        let badge = document.getElementById("provider-info");

        // Deteksi mulai jalan kalau nomor sudah diketik minimal 4 angka
        if (noHP.length >= 4) {
            let prefix = noHP.substring(0, 4);
            let provider = deteksiPrefix(prefix);
            
            if (provider) {
                badge.style.display = "inline-block";
                badge.innerText = "Provider: " + provider.toUpperCase();
                ambilProdukDariFirestore(kategoriAktif, provider);
            } else {
                badge.style.display = "none";
                document.getElementById("daftar-produk").innerHTML = "";
            }
        } else {
            badge.style.display = "none";
            document.getElementById("daftar-produk").innerHTML = "";
        }
    }

    function deteksiPrefix(prefix) {
        if (["0811", "0812", "0813", "0821", "0822", "0823", "0852", "0853"].includes(prefix)) return "telkomsel";
        if (["0856", "0857", "0858"].includes(prefix)) return "indosat";
        if (["0817", "0818", "0819", "0859", "0877", "0878"].includes(prefix)) return "xl";
        if (["0831", "0832", "0833", "0838"].includes(prefix)) return "axis";
        if (["0895", "0896", "0897", "0898", "0899"].includes(prefix)) return "tri";
        if (["0881", "0882", "0883", "0888", "0889"].includes(prefix)) return "smartfren";
        if (["0851"].includes(prefix)) return "byu";
        return null;
    }

    // FUNGSI 3: MENARIK DATA PRODUK DARI FIRESTORE DATABASE
    function ambilProdukDariFirestore(kategori, provider) {
        document.getElementById("loading-produk").style.display = "block";
        let container = document.getElementById("daftar-produk");
        container.innerHTML = "";

        // Mengambil produk berdasarkan kategori dan provider
        db.collection("products")
          .where("kategori", "==", kategori)
          .where("provider", "==", provider)
          .get()
          .then((querySnapshot) => {
              document.getElementById("loading-produk").style.display = "none";
              
              if(querySnapshot.empty) {
                  container.innerHTML = "<div style='text-align:center; color:red; padding:10px;'>Produk belum tersedia di etalase ini.</div>";
                  return;
              }

              // Masukkan data ke dalam Array agar bisa diurutkan harganya dari murah ke mahal
              let produkList = [];
              querySnapshot.forEach((doc) => {
                  produkList.push(doc.data());
              });
              
              produkList.sort((a, b) => Number(a.harga) - Number(b.harga));

              produkList.forEach((produk) => {
                  container.innerHTML += `
                      <div class="product-card" onclick="beliSekarang('${produk.sku}', '${produk.nama_produk}')">
                          <div>
                              <div class="product-name">${produk.nama_produk}</div>
                              <small style="color:#6c757d">Kode: ${produk.sku.toUpperCase()}</small>
                          </div>
                          <div class="product-price">Rp ${Number(produk.harga).toLocaleString('id-ID')}</div>
                      </div>
                  `;
              });
          })
          .catch((error) => {
              document.getElementById("loading-produk").style.display = "none";
              console.log("Error mengambil produk: ", error);
          });
    }

    // FUNGSI 4: EKSEKUSI TOMBOL BELI KE SERVER APPS SCRIPT KITA
    function beliSekarang(sku, nama) {
        let tujuan = document.getElementById("input-tujuan").value;
        if(!tujuan) { 
            alert("Nomor tujuan wajib diisi terlebih dahulu!"); 
            return; 
        }

        let konfirmasi = confirm("Beli " + nama + " ke nomor " + tujuan + "?");
        if (!konfirmasi) return;

        // ==========================================================
        // WAJIB GANTI URL DI BAWAH INI DENGAN LINK APPS SCRIPT ANDA!
        // ==========================================================
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyawrjcfIRfr2Ch4WBIwhx2E-iUwG_Z3lcG79mjv574boopSURi_WgMsR3D26uYCZEY/exec";
        
        fetch(URL_APPS_SCRIPT, {
            method: "POST",
            body: JSON.stringify({ sku: sku, tujuan: tujuan })
        })
        .then(res => res.json())
        .then(hasil => {
            alert("STATUS TRANSAKSI: " + (hasil.data ? hasil.data.message : JSON.stringify(hasil)));
        })
        .catch(err => {
            alert("Koneksi gagal/Terputus: " + err);
        });
    }
</script>
</body>
</html>
