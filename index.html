<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LytoosPay - Pembayaran Digital Nasional</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DESAIN PREMIUM LYTOOSPAY */
        :root {
            --primary: #0a4275; /* Biru Gelap Premium */
            --accent: #f39c12; /* Emas Elegan */
            --bg: #f4f7f6;
            --surface: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; }
        
        .app-container {
            width: 100%; max-width: 480px; min-height: 100vh;
            background: var(--surface); position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05); overflow-x: hidden;
        }

        /* HEADER & SALDO CARD */
        .header-section {
            background: linear-gradient(135deg, var(--primary), #105b9e);
            padding: 30px 20px 60px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            color: white; position: relative;
        }
        .app-title { font-size: 24px; font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
        .app-title i { color: var(--accent); }
        
        .balance-card {
            background: white; border-radius: var(--radius);
            padding: 25px; margin: -40px 20px 20px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center;
        }
        .balance-info p { color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .balance-info h2 { color: var(--primary); font-size: 28px; font-weight: 800; margin-top: 5px; }
        .btn-topup {
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 12px; font-weight: 700;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-topup:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(243, 156, 18, 0.3); }

        /* MENU KATEGORI */
        .menu-section { padding: 10px 20px; }
        .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: var(--text-main); }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .menu-item { cursor: pointer; transition: 0.2s; }
        .menu-item:hover { transform: scale(1.05); }
        .menu-icon {
            width: 55px; height: 55px; background: var(--bg);
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 8px auto; font-size: 24px; color: var(--primary);
        }
        .menu-item p { font-size: 12px; font-weight: 600; color: var(--text-muted); }

        /* AREA PRODUK */
        .product-area { padding: 20px; }
        .product-card {
            background: white; border: 1px solid #f0f0f0; border-radius: 16px;
            padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.2s;
        }
        .product-card:hover { border-color: var(--primary); }
        .prod-detail h4 { font-size: 16px; color: var(--text-main); margin-bottom: 4px; }
        .prod-detail p { font-size: 12px; color: var(--text-muted); }
        .prod-price { font-size: 16px; font-weight: 800; color: var(--primary); }
        .btn-buy {
            background: var(--primary); color: white; border: none;
            padding: 8px 15px; border-radius: 8px; font-weight: 600;
            margin-top: 8px; cursor: pointer; width: 100%;
        }

        /* SPLASH SCREEN ELEGAN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: opacity 0.6s ease;
        }
        .splash-title { font-size: 32px; font-weight: 800; margin-top: 15px; letter-spacing: 1px; }
        .splash-title span { color: var(--accent); }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <i class="fa-solid fa-wallet" style="font-size: 60px; color: var(--accent);"></i>
        <div class="splash-title">Lytoos<span>Pay</span></div>
        <p style="opacity: 0.8; margin-top: 5px;">Memuat Database Nasional...</p>
    </div>

    <div class="app-container">
        <!-- Header -->
        <div class="header-section">
            <div class="app-title"><i class="fa-solid fa-bolt"></i> LytoosPay</div>
            <p style="margin-top: 5px; opacity: 0.9; font-size: 14px;">Transaksi Cepat, Aman, Terpercaya</p>
        </div>

        <!-- Kartu Saldo (Nanti dihubungkan ke Firebase/User Auth) -->
        <div class="balance-card">
            <div class="balance-info">
                <p>Saldo Aktif</p>
                <h2>Rp 0</h2>
            </div>
            <button class="btn-topup"><i class="fa-solid fa-plus"></i> Isi Saldo</button>
        </div>

        <!-- Menu Utama -->
        <div class="menu-section">
            <h3 class="menu-title">Layanan Nasional</h3>
            <div class="menu-grid">
                <div class="menu-item" onclick="filterKategori('Pulsa')">
                    <div class="menu-icon"><i class="fa-solid fa-mobile-screen"></i></div>
                    <p>Pulsa</p>
                </div>
                <div class="menu-item" onclick="filterKategori('Data')">
                    <div class="menu-icon"><i class="fa-solid fa-globe"></i></div>
                    <p>Data</p>
                </div>
                <div class="menu-item" onclick="filterKategori('E-Wallet')">
                    <div class="menu-icon"><i class="fa-solid fa-wallet"></i></div>
                    <p>E-Wallet</p>
                </div>
                <div class="menu-item" onclick="filterKategori('PLN')">
                    <div class="menu-icon"><i class="fa-solid fa-lightbulb"></i></div>
                    <p>PLN</p>
                </div>
            </div>
        </div>

        <!-- Daftar Produk -->
        <div class="product-area">
            <h3 class="menu-title" id="judulProduk">Rekomendasi Produk</h3>
            <div id="listProduk">
                <p style="text-align:center; color:#636e72; font-size: 14px;"><i class="fa-solid fa-spinner fa-spin"></i> Sinkronisasi dengan Firebase...</p>
            </div>
        </div>
    </div>

    <!-- Panggil File Javascript sebagai Module (Syarat Wajib Firebase v9+) -->
    <script type="module" src="./script.js"></script>
</body>
</html>
